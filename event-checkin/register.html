<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Event Registration</title>
  <link rel="stylesheet" href="register-styles.css">
</head>
<body>
  <div class="container">
    <div class="form-card">
      <div class="form-header">
        <div class="logo">📝</div>
        <h1>Registration Form</h1>
      </div>

      <div class="event-info" id="eventInfo">
        <!-- Event info will be loaded here -->
      </div>

      <form id="registrationForm" class="registration-form">
        <div class="form-group">
          <label for="name">Name <span class="required">*</span></label>
          <input 
            type="text" 
            id="name" 
            name="name" 
            required 
            placeholder="Enter your full name"
          >
        </div>

        <div class="form-group">
          <label for="email">Email <span class="required">*</span></label>
          <input 
            type="email" 
            id="email" 
            name="email" 
            required 
            placeholder="Enter your email address"
          >
        </div>

        <button type="submit" class="submit-btn">
          <span class="btn-text">Submit</span>
          <span class="btn-loader" style="display: none;">Submitting...</span>
        </button>
      </form>

      <div class="success-message" id="successMessage" style="display: none;">
        <div class="success-icon">✓</div>
        <h2>Registration Successful!</h2>
        <p>Thank you for registering. We'll send you event details via email.</p>
        <button onclick="window.location.href='index.html'" class="back-btn">
          Back to Events
        </button>
      </div>
    </div>
  </div>

  <script src="register.js"></script>
</body>
</html>
